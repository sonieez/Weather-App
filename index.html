<!DOCTYPE html>
<html>
  <head>
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css"></link>
  </head>
  <body>
    <div class="webpage">
      <div class="current-city">
        <div>
          <p class="city-name js-city-name"></p>
          <p class="country-name js-country-name"></p>
        </div>
        <div class="current-time">
          <p class="current-day js-current-day">Thursday</p>
          <p class="current-date js-current-date">26.02.2026</p>
        </div>
      </div>
      <div class="search-bar-container">
        <input class="new-city-input js-input-city" placeholder="Enter a city name">
        <button class="search-city-button js-search-button">🔍</button>
      </div>
      <div class="city-info">
        <div class="city-main-info"></div>
        <div class="city-info-details"></div>
      </div>
      <div class="days-info js-days-weather">
      </div>
    </div>

    <script type="module" src="weather.js"></script>
  </body>
</html>
