<!DOCTYPE html>
<html>
  <head>
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css"></link>
  </head>
  <body>
    <div class="webpage">
      <div class="current-city">
        <div>
          <p class="city-name js-city-name"></p>
          <p class="country-name js-country-name"></p>
        </div>
        <div>
          <p class="current-day js-current-day">Thursday</p>
          <p class="current-date js-current -date">26.02.2026</p>
          <p class="current-time js-current-time">00:10</p>
        </div>
      </div>
      <div class="search-bar-container">
        <input class="new-city-input js-input-city" placeholder="Enter a city name">
        <button class="search-city-button js-search-button">🔍</button>
      </div>
      <div class="city-info">
        <div class="city-main-info"></div>
        <div class="city-info-details"></div>
      </div>
      <div class="days-info">
        <div class="days">
          <p class="day-1">Friday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-2">Saturday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-3">Sunday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-4">Monday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>
        
        <div class="days">
          <p class="day-5">Tuesday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>
      </div>
    </div>

    <script type="module" src="weather.js"></script>
  </body>
</html>
