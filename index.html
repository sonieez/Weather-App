<!DOCTYPE html>
<html>
  <head>
    <title>WeatherView</title>
    <link rel="stylesheet" href="weather.css">
  </head>
  <body>
    <div class="app-details">
      <p class="app-name">WeatherView</p>
      <p class="app-description">View the simple & accurate forecast</p>
    </div>

    <div class="search-bar-container">
      <div class="search-bar">
        <input class="new-city-input js-input-city" placeholder="Search a city...">
        <button class="search-city-button js-search-button">🔍</button>
        <p class="current-day js-current-day">Wed</p>
        <p class="current-date js-current-date">11/03/2026</p>
      </div>
    </div>

    <div class="city-main-info-container">

    </div>

    <div class="info-container">

      <div class="weather-details">

        <div class="days-info js-days-weather">

        </div>

        <div class="city-info-details">

        </div>
      </div>
    </div>

    <script type="module" src="weather.js"></script>
  </body>
</html>
