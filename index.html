<!DOCTYPE html>
<html>
  <head>
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css"></link>
  </head>
  <body>
    <div class="webpage">
      <div class="current-city">
        <p class="city-name">BAKU</p>
        <p class="country-name">Azerbaijan</p>
        <p class="current-day">Thursday</p>
        <p class="current-date">26.02.2026</p>
        <p class="current-time">00:10</p>
      </div>
      <div class="search-bar-container">
        <input class="new-city-input" placeholder="Enter a city name">
        <button class="search-city-button">🔍</button>
      </div>
      <div class="city-info">
        <div class="city-main-info">
          <img class="weather-icon" src="https://cdn-icons-png.flaticon.com/128/616/616516.png">
          <p class="temperature">6°</p>
          <p class="weather-status">Cloudy</p>
          <p class="temperature-max-min">7°/6°</p>
          <p class="temperature-feels-like">Feels like 6°</p>
        </div>
        <div class="city-info-details">

          <div class="humidity-container">
            <p class="detail-name">Humidity</p>
            <p class="detail-info">94%</p>
          </div>

          <div class="pressure-container">
            <p class="detail-name">Pressure</p>
            <p class="detail-info">1080.0 mb</p>
          </div>

          <div class="wind-speed-container">
            <p class="detail-name">Wind Speed</p>
            <p class="detail-info">4 km/h</p>
          </div>

          <div class="visibility-container">
            <p class="detail-name">Visibility</p>
            <p class="detail-info">10.00 km</p>
          </div>

        </div>
      </div>
      <div class="days-info">
        <div class="days">
          <p class="day-1">Friday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-2">Saturday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-3">Sunday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>

        <div class="days">
          <p class="day-4">Monday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>
        
        <div class="days">
          <p class="day-5">Tuesday</p>
          <img class="day-icon" src="https://cdn-icons-png.flaticon.com/128/8047/8047243.png">
          <p class="days-temperature">7° 2°</p>
        </div>
      </div>
    </div>
  </body>
</html>
